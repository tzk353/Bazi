<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>八字排盤 - 專業版</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="八字排盤">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0a05">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Ma+Shan+Zheng&display=swap');

  :root {
    --gold: #c9a84c; 
    --gold-light: #e8c97a; 
    --gold-dark: #8a6a1a;
    --red: #c0392b; 
    --ink: #1a1008; 
    --paper: #f5ead0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    background: #0d0a05; 
    color: var(--paper) !important; /* 強制文字顏色 */
    font-family: 'Noto Serif TC', serif; 
    min-height: 100vh; 
    overflow-x: hidden; 
  }

  /* 強制讓所有標籤、段落、跨度文字變亮 */
  h1, h2, h3, p, span, label, div {
    color: var(--paper) !important;
  }

  /* 調整輸入框顏色，讓字體在亮色背景下也好讀 */
  input, select { 
    background: rgba(255, 255, 255, 0.1) !important; 
    border: 1px solid var(--gold) !important; 
    color: #ffffff !important; 
    padding: 10px;
    border-radius: 4px;
  }

  .container { 
    position:relative; 
    z-index:1; 
    max-width:960px; 
    margin:0 auto; 
    padding:20px 16px; 
  }

  header { text-align:center; padding:36px 0 24px; }
  
  h1 { 
    font-family:'Ma Shan Zheng',serif; 
    font-size:clamp(36px,8vw,60px); 
    color:var(--gold-light) !important; 
    text-shadow:0 0 20px rgba(201,168,76,0.6); 
    letter-spacing:12px; 
  }

  .input-panel { 
    background: rgba(201,168,76,0.05); 
    border: 1px solid rgba(201,168,76,0.3); 
    padding: 24px; 
    margin-bottom: 20px; 
    border-radius: 8px;
  }

  .btn-primary { 
    width: 100%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold)); 
    color: var(--ink) !important; 
    border: none;
    padding: 15px;
    font-weight: bold;
    letter-spacing: 5px;
    cursor: pointer;
    margin-top: 10px;
  }

  /* 五行顏色設定 */
  .wood { color: #7dba5a !important; } 
  .fire { color: #e05540 !important; } 
  .earth { color: #d4a435 !important; } 
  .metal { color: #aabcc8 !important; } 
  .water { color: #5a9dc8 !important; }

  /* 這裡補齊你被截斷的表格樣式 */
  .bazi-table { 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    border: 1px solid var(--gold); 
    margin-top: 20px;
  }
  .bazi-col { 
    border-right: 1px solid rgba(201,168,76,0.3); 
    text-align: center;
  }
  .bazi-header { background: rgba(201,168,76,0.2); padding: 10px; color: var(--gold) !important; }
  .heavenly-stem, .earthly-branch { font-family: 'Ma Shan Zheng', serif; font-size: 30px; padding: 10px 0; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1>八字排盤<span>紫微斗數命理</span></h1>
    <div class="divider"><div class="divider-gem"></div></div>
  </header>

  <div class="input-panel" data-label="命主資訊">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <div class="field-group">
        <label>姓名 / 稱呼</label>
        <input type="text" placeholder="例：小明">
      </div>
      <div class="field-group">
        <label>出生年份 (西元)</label>
        <input type="number" placeholder="例：1990">
      </div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px;">
      <div class="field-group">
        <label>月份</label>
        <select>
          <option>選擇月份</option>
          <option value="1">1月</option><option value="2">2月</option>
          </select>
      </div>
      <div class="field-group">
        <label>日期</label>
        <input type="number" placeholder="15">
      </div>
      <div class="field-group">
        <label>時辰</label>
        <select>
          <option>子時 (23-01)</option>
          <option>丑時 (01-03)</option>
          </select>
      </div>
    </div>

    <button class="btn-primary">開始排盤</button>
  </div>

  <div id="results">
    <div class="section-title">乾坤八字</div>
    <div class="bazi-table">
      <div class="bazi-col"><div class="bazi-header">年柱</div><div class="heavenly-stem wood">甲</div><div class="earthly-branch fire">午</div></div>
      <div class="bazi-col"><div class="bazi-header">月柱</div><div class="heavenly-stem earth">戊</div><div class="earthly-branch metal">申</div></div>
      <div class="bazi-col"><div class="bazi-header">日柱</div><div class="heavenly-stem water">壬</div><div class="earthly-branch wood">寅</div></div>
      <div class="bazi-col" style="border:none;"><div class="bazi-header">時柱</div><div class="heavenly-stem fire">丙</div><div class="earthly-branch earth">戌</div></div>
    </div>
  </div>
</div>

</body>
</html>
